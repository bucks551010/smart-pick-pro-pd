# ================================================================
# Smart Pick Pro — Nginx reverse proxy configuration
#
# Key responsibilities:
#   1. WebSocket upgrade for Streamlit's /_stcore/stream endpoint
#      with 24-hour read/send timeouts (never interrupt live pages)
#   2. Session affinity (ip_hash) on the Streamlit upstream to
#      ensure WebSocket reconnects always reach the same replica
#   3. /healthz passthrough to FastAPI for ALB/ACA health probes
#   4. Security headers (CSP, HSTS, X-Frame-Options, etc.)
#   5. Gzip compression for text/JS/CSS assets
#
# TLS termination:
#   Uncomment the HTTPS server block and mount your cert+key into
#   ./nginx/ssl/ before enabling port 443.
#   In Azure Container Apps with managed certificates, TLS is
#   terminated at the ACA ingress; remove the HTTPS block entirely.
# ================================================================

worker_processes      auto;
worker_rlimit_nofile  65535;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # ── Connection tuning ────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;   # hide nginx version

    # ── Gzip ─────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── WebSocket upgrade map ────────────────────────────────
    # Converts the Upgrade header into the Connection value that
    # Streamlit's tornado WebSocket server expects.
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    # ── Upstreams ─────────────────────────────────────────────
    # ip_hash: routes each client IP to the same backend replica.
    # This is the standard session-affinity mechanism for Streamlit
    # because each browser tab maintains a single stateful WS
    # connection; if routed to a different replica on reconnect the
    # session state is lost.
    upstream streamlit_app {
        ip_hash;
        server  app:8501;
        keepalive 32;
    }

    # FastAPI is stateless — plain round-robin is fine.
    upstream fastapi_api {
        server  api:8000;
        keepalive 16;
    }

    # ── HTTP server ──────────────────────────────────────────
    server {
        listen       80;
        listen  [::]:80;
        server_name  _;

        # ── Security headers ─────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"           always;
        add_header X-Content-Type-Options    "nosniff"              always;
        add_header Referrer-Policy           "strict-origin"        always;
        add_header X-XSS-Protection          "1; mode=block"        always;
        add_header Permissions-Policy        "geolocation=()"       always;
        # HSTS — only enable once TLS is confirmed end-to-end
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Load-balancer / ACA health probe ─────────────────
        # Must respond in < 2 s with 200 — zero DB I/O inside FastAPI.
        location = /healthz {
            proxy_pass         http://fastapi_api/healthz;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_read_timeout 5s;
            access_log         off;
        }

        # ── FastAPI REST endpoints ────────────────────────────
        location ^~ /api/ {
            proxy_pass             http://fastapi_api/;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     60s;
            proxy_send_timeout     60s;
            proxy_connect_timeout  10s;
        }

        # ── Streamlit WebSocket (/_stcore/stream) ────────────
        # CRITICAL: read/send timeouts must be very long.
        # Streamlit keeps a single WS open for the entire session
        # (Live Sweat, Live Games, real-time tracking).
        # Setting these to 86400s (24 h) prevents nginx from
        # killing idle-but-alive sessions.
        # proxy_buffering MUST be off for streaming responses.
        location = /_stcore/stream {
            proxy_pass             http://streamlit_app;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        $connection_upgrade;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     86400s;
            proxy_send_timeout     86400s;
            proxy_connect_timeout  10s;
            proxy_buffering        off;
            proxy_cache            off;
        }

        # ── Streamlit static assets ───────────────────────────
        location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
            proxy_pass         http://streamlit_app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            expires            1d;
            add_header         Cache-Control "public, max-age=86400, immutable";
        }

        # ── Streamlit: all other routes ───────────────────────
        # WebSocket headers are forwarded here too because
        # Streamlit uses WS for component communication on every page.
        location / {
            proxy_pass             http://streamlit_app;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        $connection_upgrade;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_read_timeout     86400s;
            proxy_send_timeout     86400s;
            proxy_buffering        off;
        }
    }

    # ── HTTPS server (uncomment when TLS certs are mounted) ──
    # For Azure Container Apps with managed certs, delete this block
    # entirely — TLS is terminated at the ACA ingress layer.
    #
    # server {
    #     listen      443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_tickets off;
    #
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Reuse the same location blocks from the HTTP server above.
    # }
}
