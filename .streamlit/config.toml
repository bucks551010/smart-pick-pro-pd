# ============================================================
# Streamlit Configuration — SmartBetPro NBA
# Forces native dark mode, eliminates white flash on load,
# and sets the "Quantum Institutional" colour palette.
# ============================================================

[theme]
primaryColor = "#00e5ff"
backgroundColor = "#06090F"
secondaryBackgroundColor = "#0C1221"
textColor = "#dce4f0"
font = "sans serif"

[server]
headless = true
maxMessageSize = 200
enableWebsocketCompression = true
# Disable CORS + XSRF so the WebSocket handshake never fails on custom domains
enableCORS = false
enableXsrfProtection = false
# Raise the upload cap to avoid silent 413 errors on CSV imports
maxUploadSize = 50

[browser]
gatherUsageStats = false
# Prevents the browser from auto-reloading the tab when the server restarts,
# which would interrupt an active analysis run.
serverAddress = "localhost"

[ui]
# hideTopBar = true removes the Streamlit toolbar (running indicator, deploy
# button, main menu) at the server level — before any CSS even loads.
# The sidebar hamburger on mobile is managed entirely by our own CSS/JS.
hideTopBar = true

[runner]
# Disable legacy caching (st.cache) — use only st.cache_data / st.cache_resource.
# This prevents cache misses from re-running expensive data loads on every rerun.
legacy_caching = false
