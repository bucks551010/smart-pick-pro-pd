# ============================================================
# Streamlit Configuration — SmartBetPro NBA
# Forces native dark mode, eliminates white flash on load,
# and sets the "Quantum Institutional" colour palette.
# ============================================================

[theme]
primaryColor = "#00e5ff"
backgroundColor = "#06090F"
secondaryBackgroundColor = "#0C1221"
textColor = "#dce4f0"
font = "sans serif"

[server]
headless = true
maxMessageSize = 200
enableWebsocketCompression = true
# Disable CORS + XSRF so the WebSocket handshake never fails on custom domains
enableCORS = false
enableXsrfProtection = false
# Raise the upload cap to avoid silent 413 errors on CSV imports
maxUploadSize = 50

[browser]
gatherUsageStats = false
# Prevents the browser from auto-reloading the tab when the server restarts,
# which would interrupt an active analysis run.
serverAddress = "localhost"

[ui]
# hideTopBar must be false so the sidebar toggle (hamburger) button
# remains accessible on mobile after closing the sidebar.
hideTopBar = false
