# ================================================================
# Smart Pick Pro — docker-compose.yml
#
# Services:
#   app    — Streamlit UI (port 8501)
#   api    — FastAPI backend (port 8000)
#   nginx  — Reverse proxy; handles WebSocket upgrades and TLS
#            termination; enforces session affinity via ip_hash
#
# Usage:
#   docker compose up --build          # dev / local
#   docker compose up -d               # detached
#   IMAGE_TAG=abc123 docker compose up # pin specific image
#
# Required secrets — copy .env.example to .env and fill values.
# Never commit .env to version control.
# ================================================================

version: "3.9"

# ── Reusable anchor for shared app config ────────────────────
x-app-base: &app-base
  image: smart-pick-pro:${IMAGE_TAG:-latest}
  build:
    context: .
    target: runtime
    args:
      BUILD_DATE: ${BUILD_DATE:-}
      GIT_SHA: ${GIT_SHA:-}
  env_file: .env
  restart: unless-stopped
  networks:
    - internal
  volumes:
    - app_data:/data        # persistent SQLite databases + cache
    - app_logs:/app/logs    # structured log files

services:

  # ── Streamlit UI ───────────────────────────────────────────
  app:
    <<: *app-base
    command: ["streamlit", "run", "Smart_Picks_Pro_Home.py",
              "--server.port=8501",
              "--server.address=0.0.0.0",
              "--server.headless=true",
              "--server.enableWebsocketCompression=true",
              "--server.maxMessageSize=1000"]
    environment:
      DB_DIR: /data
      PORT: "8501"
      ENVIRONMENT: ${ENVIRONMENT:-development}
    healthcheck:
      # Streamlit's native liveness probe — available from v1.12+
      test: ["CMD", "curl", "-sf", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 8s
      start_period: 45s
      retries: 3
    deploy:
      replicas: ${APP_REPLICAS:-1}   # set to 2+ in prod via env or override file
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 768m

  # ── FastAPI backend ────────────────────────────────────────
  api:
    <<: *app-base
    command: ["uvicorn", "api.main:app",
              "--host", "0.0.0.0",
              "--port", "8000",
              "--workers", "2",
              "--proxy-headers",
              "--forwarded-allow-ips", "*",
              "--timeout-keep-alive", "75"]
    environment:
      DB_DIR: /data
      ENVIRONMENT: ${ENVIRONMENT:-development}
    healthcheck:
      # /healthz is a zero-cost liveness probe (no DB I/O)
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
      interval: 20s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      replicas: ${API_REPLICAS:-1}
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m

  # ── Nginx reverse proxy ────────────────────────────────────
  # Handles:
  #   • WebSocket upgrade for Streamlit /_stcore/stream
  #   • Session affinity (ip_hash) so WS reconnects hit the same
  #     app replica — critical for Streamlit's stateful model
  #   • Security headers
  #   • Gzip compression for static assets
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # mount TLS cert + key here
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  internal:
    driver: bridge

volumes:
  app_data:
    driver: local
  app_logs:
    driver: local
