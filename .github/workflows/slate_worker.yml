name: Slate Worker — Tonight's Picks Pipeline

# Runs slate_worker.py on a frequent schedule so the DB always has
# tonight's pre-computed picks ready before users log in.
#
# Schedule window: ~9 AM ET → 2 AM ET every day (full NBA coverage).
# Three cron blocks:
#   Block A: 13:00–15:30 UTC  (9 AM–11:30 AM ET)  — early slate, props available by 9 AM
#   Block B: 16:00–23:30 UTC  (12 PM–7:30 PM ET)  — afternoon/evening prep
#   Block C: 00:00–06:00 UTC  (8 PM–2 AM ET, next UTC day) — live game window
# Each fires every 30 minutes.
#
# Required repository secrets (Settings → Secrets → Actions):
#   DATABASE_URL   — Railway PostgreSQL connection string
#   ODDS_API_KEY   — (optional) The Odds API key for DK enrichment

on:
  schedule:
    # Block A — every 30 min, 9 AM–11:30 AM ET (13:00–15:30 UTC)
    - cron: "0,30 13-15 * * *"
    # Block B — every 30 min, 12 PM–7:30 PM ET (16:00–23:30 UTC)
    - cron: "0,30 16-23 * * *"
    # Block C — every 30 min, 8 PM–2 AM ET (00:00–06:00 UTC, next day)
    - cron: "0,30 0-6 * * *"
  workflow_dispatch:          # Manual trigger from GitHub UI
    inputs:
      dry_run:
        description: "Dry run (analyse but skip DB writes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  slate:
    name: Run slate_worker.py
    runs-on: ubuntu-latest
    timeout-minutes: 20       # hard kill if pipeline hangs
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"  # opt into Node.js 24 for actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run slate worker
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
            echo "DRY RUN mode — no DB writes."
          fi
          python slate_worker.py $DRY_FLAG
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          QAM_SIM_DEPTH: "1000"
          SLATE_WORKER_LOG: "INFO"
          LOG_LEVEL: "INFO"

      - name: Signal Streamlit containers (bump DB data_version)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python - <<'EOF'
          # Write a cross-container data_version to the DB so any running
          # Streamlit session detects fresh picks and re-queries the DB.
          try:
              from tracking.database import _bump_data_version, _nba_today_iso
              _bump_data_version(_nba_today_iso())
              print("data_version bumped in DB.")
          except Exception as e:
              print(f"data_version bump skipped (non-fatal): {e}")
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
