[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns  = ["**"]

[deploy]
startCommand          = "uvicorn webhook.api:app --host 0.0.0.0 --port ${PORT:-8000}"
restartPolicyType     = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath       = "/healthz"
healthcheckTimeout    = 300
