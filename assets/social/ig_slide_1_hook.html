<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IG Slide 1 — 103 Wins Hook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1080px; height: 1080px; overflow: hidden;
  background: #060B18;
  font-family: 'Inter', sans-serif;
  display: flex; align-items: center; justify-content: center;
}
.slide {
  width: 1080px; height: 1080px;
  background: linear-gradient(145deg, #060B18 0%, #0C1830 50%, #060B18 100%);
  border: 2px solid rgba(0,213,89,0.15);
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 80px;
}

/* Background grid lines */
.slide::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,213,89,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,213,89,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Glow orbs */
.glow-tl {
  position: absolute; top: -120px; left: -120px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,213,89,0.14) 0%, transparent 65%);
}
.glow-br {
  position: absolute; bottom: -120px; right: -120px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,240,255,0.08) 0%, transparent 65%);
}
.glow-center {
  position: absolute;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(0,213,89,0.07) 0%, transparent 60%);
}

/* Top bar */
.topbar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(90deg, #00D559, #00f0ff, #00D559);
}

/* Brand chip */
.brand-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(0,213,89,0.08);
  border: 1px solid rgba(0,213,89,0.25);
  border-radius: 50px;
  padding: 8px 22px;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.2em;
  color: #00D559;
  text-transform: uppercase;
  margin-bottom: 36px;
}
.brand-dot {
  width: 8px; height: 8px;
  background: #00D559;
  border-radius: 50%;
  box-shadow: 0 0 10px #00D559;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.7); }
}

/* Big number */
.big-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13rem;
  line-height: 0.9;
  color: #00D559;
  text-shadow:
    0 0 60px rgba(0,213,89,0.7),
    0 0 120px rgba(0,213,89,0.4),
    0 0 200px rgba(0,213,89,0.15);
  letter-spacing: -0.02em;
  position: relative; z-index: 1;
}

.wins-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4.2rem;
  color: #ffffff;
  letter-spacing: 0.15em;
  margin-top: 4px;
  position: relative; z-index: 1;
}
.wins-label span { color: #00D559; }

.sub {
  font-size: 1.1rem;
  font-weight: 700;
  color: #475569;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 20px;
  position: relative; z-index: 1;
}

/* Swipe hint */
.swipe {
  position: absolute; bottom: 44px; right: 56px;
  display: flex; align-items: center; gap: 10px;
  font-size: 0.85rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  color: #334155;
  text-transform: uppercase;
}
.swipe-arrow {
  font-size: 1.2rem;
  color: #00D559;
  animation: slidex 1.4s ease-in-out infinite;
}
@keyframes slidex {
  0%,100% { transform: translateX(0); }
  50% { transform: translateX(7px); }
}

/* Bottom brand */
.bottom-brand {
  position: absolute; bottom: 44px; left: 56px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 0.18em;
  color: #1e3a5f;
}
.bottom-brand span { color: #00D559; }

/* Slide dots */
.dots {
  position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px;
}
.dot { width:8px;height:8px;border-radius:50%;background:#1e3a5f; }
.dot.active { background:#00D559; box-shadow: 0 0 8px #00D559; }
</style>
</head>
<body>
<div class="slide">
  <div class="topbar"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="glow-center"></div>

  <div class="brand-chip">
    <div class="brand-dot"></div>
    SmartPickPro
  </div>

  <div class="big-num">103</div>
  <div class="wins-label">WINS <span>&amp; COUNTING</span></div>
  <div class="sub">Quantum Matrix Engine™ 5.6 &nbsp;·&nbsp; All Results On File</div>

  <div class="bottom-brand">Smart<span>Pick</span>Pro</div>
  <div class="swipe">SWIPE <span class="swipe-arrow">→</span></div>

  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>
</body>
</html>
