# ============================================================
# Streamlit Configuration — SmartBetPro NBA
# Forces native dark mode, eliminates white flash on load,
# and sets the "Quantum Institutional" colour palette.
# ============================================================

[theme]
primaryColor = "#00f0ff"
backgroundColor = "#070A13"
secondaryBackgroundColor = "#0F172A"
textColor = "#c8d8f0"
font = "sans serif"

[server]
headless = true
maxMessageSize = 1000
enableWebsocketCompression = true
# Mobile connections on LTE/3G can be slow; 60s default is too short
# when the DB + JS bridge session restore happen on the same first run.
scriptRunTimeoutSecs = 120

[browser]
gatherUsageStats = false

[ui]
# hideTopBar must be false so the sidebar toggle (hamburger) button
# remains accessible on mobile after closing the sidebar.
hideTopBar = false
