[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# redeploy trigger: 2026-04-26

# ──────────────────────────────────────────────────────────────
# WORKER SERVICE
# The slate_worker daemon runs the full picks pipeline every 30 min
# independently of the web process.  In Railway, add a second service
# pointing at the same repo and set its start command to:
#     python slate_worker.py --daemon
# OR use the Procfile `worker:` entry when Railway detects it.
#
# Environment variables needed on the worker service (same as web):
#   DATABASE_URL, DB_DIR, PRIZEPICKS_API_KEY, UNDERDOG_API_KEY
# ──────────────────────────────────────────────────────────────
